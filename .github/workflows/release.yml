name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-release.txt

      - name: Run tests
        run: python -m pytest

      - name: Semantic Release
        id: semantic
        uses: python-semantic-release/python-semantic-release@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: "github-actions"
          git_committer_email: "actions@github.com"

      - name: Build portable .exe
        if: steps.semantic.outputs.released == 'true'
        run: |
          python -m PyInstaller --noconfirm --onefile --windowed --name project_init_portable --add-data "templates;templates" --add-data "templates_config.json;." --add-data "assets_logo.png;." --hidden-import PIL --hidden-import PIL._tkinter_finder --workpath _build_temp/project_init_portable --distpath dist project_init.py

      - name: Upload .exe to release
        if: steps.semantic.outputs.released == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/project_init_portable.exe
          tag_name: v${{ steps.semantic.outputs.version }}